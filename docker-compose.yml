services:
  db:
    image: postgres:15-alpine
    container_name: colonscan_db
    environment:
      POSTGRES_DB: ${DB_NAME:-colonscan}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: colonscan_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --worker-class sync --worker-connections 1000 --timeout 900 --graceful-timeout 60 --keep-alive 5 --max-requests 1000 --max-requests-jitter 100 colonscan_project.wsgi:application"
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-colonscan}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      # Google Cloud Storage
      GCS_ENABLED: ${GCS_ENABLED:-True}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GCS_EVIDENCE_PREFIX: ${GCS_EVIDENCE_PREFIX:-evaluations/ctc_scans}
      # API del modelo de análisis
      API_URL: ${API_URL:-http://localhost:8001/api/v1/analyse}
      API_TIMEOUT: ${API_TIMEOUT:-900}
      API_KEY: ${API_KEY:-}
      API_ENABLE_SSL_VERIFY: ${API_ENABLE_SSL_VERIFY:-False}
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./:/app
      - gcloud-config:/home/appuser/.config/gcloud
    healthcheck:
      test: ["CMD", "python", "manage.py", "check", "--database", "default"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

volumes:
  postgres_data:
  gcloud-config:

networks:
  default:
    name: colonscan-network
    driver: bridge
