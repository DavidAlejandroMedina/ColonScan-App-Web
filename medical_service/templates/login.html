        <p class="version">v1.0.0 - Sistema seguro de análisis médico</p>
    </div>
    <script>
        function initializePasswordToggle() {
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('id_password');
            const eyeVisible = document.querySelector('.eye-visible');
            const eyeHidden = document.querySelector('.eye-hidden');

            if (togglePassword && passwordInput) {
                togglePassword.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    // Cambiar el tipo de input
                    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    passwordInput.setAttribute('type', type);
                    
                    // Actualizar íconos
                    if (type === 'password') {
                        // Contraseña oculta - mostrar ojo normal
                        eyeVisible.style.display = 'block';
                        eyeHidden.style.display = 'none';
                        this.setAttribute('aria-label', 'Mostrar contraseña');
                        this.setAttribute('title', 'Mostrar contraseña');
                    } else {
                        // Contraseña visible - mostrar ojo tachado
                        eyeVisible.style.display = 'none';
                        eyeHidden.style.display = 'block';
                        this.setAttribute('aria-label', 'Ocultar contraseña');
                        this.setAttribute('title', 'Ocultar contraseña');
                    }
                });
            }
        }

        // Mostrar notificación de logout exitoso
        function checkLogoutSuccess() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('logout_success') === '1') {
                showLogoutNotification();
                // Limpiar la URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        }

        function showLogoutNotification() {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background-color: #000d1f;
                color: #5896f3;
                padding: 1rem 1.5rem;
                border-radius: 8px;
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                z-index: 1000;
                font-weight: 500;
                animation: slideIn 0.3s ease-out;
                display: flex;
                align-items: center;
                gap: 0.75rem;
            `;

            const iconSVG = `
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 20 20"><path fill="currentColor" fill-rule="evenodd" d="M18 10a8 8 0 1 1-16 0a8 8 0 0 1 16 0m-7-4a1 1 0 1 1-2 0a1 1 0 0 1 2 0M9 9a.75.75 0 0 0 0 1.5h.253a.25.25 0 0 1 .244.304l-.459 2.066A1.75 1.75 0 0 0 10.747 15H11a.75.75 0 0 0 0-1.5h-.253a.25.25 0 0 1-.244-.304l.459-2.066A1.75 1.75 0 0 0 9.253 9z" clip-rule="evenodd"/></svg>
            `;

            const messageSpan = document.createElement('span');
            messageSpan.style.cssText = `
                display: flex;
                align-items: center;
                gap: 0.75rem;
            `;
            messageSpan.innerHTML = `${iconSVG}<span>Sesión cerrada<br>Ha salido del sistema de forma segura</span>`;

            notification.appendChild(messageSpan);
            document.body.appendChild(notification);

            // Agregar animación si no existe
            if (!document.querySelector('style[data-notification-animation]')) {
                const style = document.createElement('style');
                style.setAttribute('data-notification-animation', 'true');
                style.textContent = `
                    @keyframes slideIn {
                        from {
                            transform: translateX(400px);
                            opacity: 0;
                        }
                        to {
                            transform: translateX(0);
                            opacity: 1;
                        }
                    }
                    @keyframes slideOut {
                        from {
                            transform: translateX(0);
                            opacity: 1;
                        }
                        to {
                            transform: translateX(400px);
                            opacity: 0;
                        }
                    }
                `;
                document.head.appendChild(style);
            }

            // Remover la notificación después de 3 segundos
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out forwards';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // Inicializar cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', function() {
            checkLogoutSuccess();
            initializePasswordToggle();
            
            // También puedes inicializar para cualquier otro campo de contraseña
            // Si hay múltiples campos de contraseña, puedes usar querySelectorAll
            const allPasswordToggles = document.querySelectorAll('.password-toggle');
            allPasswordToggles.forEach(toggle => {
                // La lógica puede ser similar pero necesitarías identificar el input asociado
            });
        });
    </script>
</body>
